name: shipping_hub
description: "Package intake & shipment management for diaspora shipping operators."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  provider: 6.1.5+1
  hive: 2.2.3
  hive_flutter: 1.1.0
  shared_preferences: 2.5.3
  http: 1.5.0
  intl: ^0.20.2
  image_picker: ^1.1.2
  share_plus: ^11.0.0
  url_launcher: ^6.3.1
  uuid: ^4.5.1
  path_provider: ^2.1.5
  path: ^1.9.1
  flutter_contacts: ^1.1.9+2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/icon/
